services:
  - type: web
    name: angel-or-devil-backend
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: angel-or-devil-db
          property: connectionString

databases:
  - name: angel-or-devil-db
    plan: free
